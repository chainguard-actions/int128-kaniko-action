name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create Dockerfile
        run: |
          mkdir -p /tmp/kaniko-context
          cat > /tmp/kaniko-context/Dockerfile <<'EOF'
          FROM scratch
          LABEL maintainer="test"
          EOF
      - id: action
        uses: .
        with:
          context: /tmp/kaniko-context
          file: /tmp/kaniko-context/Dockerfile
          push: 'false'
          tags: |
            localhost/test-image:latest
          labels: |
            org.opencontainers.image.title=test
          verbosity: info
      - name: Assert action completed
        run: |
          echo "Action completed successfully"
          echo "PASS"
