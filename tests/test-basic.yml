name: Test basic kaniko build inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          context: ${{ github.workspace }}/actions/hardened/int128--kaniko-action/v1.63.0/tests/fixtures
          file: ${{ github.workspace }}/actions/hardened/int128--kaniko-action/v1.63.0/tests/fixtures/Dockerfile
          push: 'false'
          tags: |
            localhost/test-image:latest
          build-args: |
            FOO=bar
          labels: |
            org.opencontainers.image.title=test
          verbosity: info
          push-retry: '1'
          kaniko-args: |
            --no-push
          docker-run-args: |
            --rm
      - name: Assert action completed
        run: |
          echo "Action step completed successfully"
          echo "PASS"
