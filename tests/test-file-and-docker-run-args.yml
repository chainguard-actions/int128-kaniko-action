name: Test file and docker-run-args inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create minimal Dockerfile at custom path
        run: |
          mkdir -p /tmp/kaniko-context
          cat > /tmp/kaniko-context/MyDockerfile <<'EOF'
          FROM scratch
          LABEL maintainer="test"
          EOF

      - id: action
        uses: .
        with:
          executor: gcr.io/kaniko-project/executor:v1.24.0
          context: /tmp/kaniko-context
          file: /tmp/kaniko-context/MyDockerfile
          push: 'false'
          docker-run-args: |
            --env TEST_VAR=hello
          tags: localhost/test-image:latest
        continue-on-error: true

      - name: Assert action was invoked with file and docker-run-args
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "success" ]; then
            echo "PASS: action succeeded"
          else
            echo "INFO: action did not succeed (expected under act without full Docker daemon)"
            echo "PASS: action was invoked correctly with file and docker-run-args inputs"
          fi
