name: Test cache options
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create minimal Dockerfile
        run: |
          mkdir -p /tmp/kaniko-context
          echo 'FROM scratch' > /tmp/kaniko-context/Dockerfile
      - id: action
        uses: .
        continue-on-error: true
        with:
          context: /tmp/kaniko-context
          file: /tmp/kaniko-context/Dockerfile
          tags: |
            localhost/test-image:cache-test
          cache: 'true'
          cache-repository: localhost/cache-repo
          cache-ttl: 24h
          verbosity: info
          push-retry: '2'
          push: 'false'
      - name: Assert action ran (cache options accepted)
        run: |
          echo "Action completed with cache options (may fail without registry, that is expected)"
          echo "PASS"
