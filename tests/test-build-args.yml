name: Test build with build-args
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create Dockerfile with ARG
        run: |
          mkdir -p /tmp/kaniko-build-args
          cat > /tmp/kaniko-build-args/Dockerfile <<'EOF'
          FROM scratch
          ARG MY_VERSION=unset
          ARG ANOTHER_ARG=default
          LABEL version=$MY_VERSION
          EOF

      - id: action
        uses: .
        with:
          executor: gcr.io/kaniko-project/executor:v1.24.0
          context: /tmp/kaniko-build-args
          push: 'false'
          tags: localhost/test-build-args:latest
          build-args: |
            MY_VERSION=1.2.3
            ANOTHER_ARG=hello
        continue-on-error: true

      - name: Assert action was invoked with build-args
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # Verify the action was invoked (not a YAML/input parsing failure)
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action was invoked with build-args input"
